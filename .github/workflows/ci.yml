name: CI

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name != 'main' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  workflow-sanity:
    name: Workflow Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Parse workflow YAML
        run: |
          ruby <<'RUBY'
          require "yaml"
          Dir[".github/workflows/*.yml"].sort.each do |path|
            YAML.load_file(path)
            puts "parsed #{path}"
          end
          RUBY

      - name: Check for upstream-only workflow references
        run: |
          set -euo pipefail
          matches="$(grep -R -n -E 'namespace-profile-ghostty|ghostty-org/ghostty|release\.files\.ghostty\.org|VOUCH_APP|mitchellh/vouch' .github/workflows --exclude=ci.yml || true)"
          if [[ -n "$matches" ]]; then
            echo "$matches"
            echo "Found upstream-only GitHub Actions references." >&2
            exit 1
          fi
